services:
  web:
    build: .
    container_name: mermaid-diagram-web
    ports:
      - "${PORT:-8080}:80"
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mermaid-diagram-mcp
    stdin_open: true
    tty: false
    profiles: ["mcp"]
    volumes:
      - ${MERMAID_OUTPUT_DIR:-./output}:/output
