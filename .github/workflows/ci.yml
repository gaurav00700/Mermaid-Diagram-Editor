name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  cli:
    name: CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets for shared config
        run: npm ci && npm run build
        working-directory: web

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install Playwright Chromium
        run: uv run playwright install chromium --with-deps

      - name: Run CLI tests
        run: uv run pytest tests/ -m cli -v

  web-local:
    name: Local web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web app
        run: npm ci && npm run build
        working-directory: web

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install Playwright Chromium
        run: uv run playwright install chromium --with-deps

      - name: Run local web E2E tests
        run: uv run pytest tests/ -m web_local -v

  web-docker:
    name: Container web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web app
        run: npm ci && npm run build
        working-directory: web

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install Playwright Chromium
        run: uv run playwright install chromium --with-deps

      - name: Run Docker web E2E tests
        run: uv run pytest tests/ -m web_docker -v

  notify-success:
    name: Notify PR success
    runs-on: ubuntu-latest
    needs: [cli, web-local, web-docker]
    if: github.event_name == 'pull_request' && success()
    steps:
      - uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            All tests passed on commit ${{ github.sha }}.

            **CLI** — render PNG/SVG, themes, backgrounds, DPI, scale, error handling
            **Local web** — editor, preview, upload, zoom, background, export dialog
            **Container web** — docker compose build + same E2E against localhost:8080
